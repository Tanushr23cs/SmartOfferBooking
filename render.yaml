services:
  - type: web
    name: smart-offer-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Secret
        sync: false
      - key: Jwt__Issuer
        value: SmartOfferBooking
      - key: Jwt__Audience
        value: SmartOfferBookingClients
      - key: Cors__AllowedOrigins__0
        sync: false
    healthCheckPath: /health
